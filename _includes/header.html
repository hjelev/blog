<header class="page-head">
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.date %}
  <p class="page-meta">
    <span class="page-meta__date">{{ page.date | date: "%Y-%m-%d" }}</span>
    {% if page.categories.size > 0 %}
      <span class="page-meta__cats">
        {% for category in page.categories %}
          <a class="tag" href="{{ site.baseurl }}/category/{{ category }}">{{ category }}</a>
        {% endfor %}
      </span>
    {% endif %}
  </p>
  {% endif %}
</header>
